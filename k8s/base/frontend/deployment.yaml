apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: multica
  labels:
    app.kubernetes.io/name: frontend
    app.kubernetes.io/part-of: multica
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: frontend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/name: frontend
        app.kubernetes.io/part-of: multica
    spec:
      serviceAccountName: frontend-sa
      terminationGracePeriodSeconds: 30
      containers:
        - name: frontend
          image: frontend:latest
          ports:
            - containerPort: 3000
              name: http
          envFrom:
            - configMapRef:
                name: frontend-config
          env:
            - name: REMOTE_API_URL
              value: "http://backend:8080"
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            periodSeconds: 5
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /
              port: 3000
            periodSeconds: 2
            failureThreshold: 30
