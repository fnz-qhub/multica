apiVersion: v1
kind: Service
metadata:
  name: postgres-headless
  namespace: multica
  labels:
    app.kubernetes.io/name: postgres
    app.kubernetes.io/part-of: multica
spec:
  clusterIP: None
  selector:
    app.kubernetes.io/name: postgres
  ports:
    - port: 5432
      targetPort: 5432
      protocol: TCP
      name: postgresql
