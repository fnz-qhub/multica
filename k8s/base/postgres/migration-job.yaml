apiVersion: batch/v1
kind: Job
metadata:
  name: db-migrate
  namespace: multica
  labels:
    app.kubernetes.io/name: db-migrate
    app.kubernetes.io/part-of: multica
    app.kubernetes.io/component: migration
spec:
  backoffLimit: 3
  ttlSecondsAfterFinished: 300
  template:
    metadata:
      labels:
        app.kubernetes.io/name: db-migrate
        app.kubernetes.io/part-of: multica
        app.kubernetes.io/component: migration
    spec:
      restartPolicy: Never
      serviceAccountName: backend-sa
      containers:
        - name: migrate
          image: multica-backend:latest
          command:
            - ./migrate
            - up
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: postgres-secrets
                  key: DATABASE_URL
