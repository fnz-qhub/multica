apiVersion: v1
kind: Secret
metadata:
  name: postgres-secrets
  namespace: multica
  labels:
    app.kubernetes.io/name: postgres
    app.kubernetes.io/part-of: multica
type: Opaque
stringData:
  POSTGRES_PASSWORD: "CHANGE_ME"
  DATABASE_URL: "postgres://multica:CHANGE_ME@postgres.multica.svc.cluster.local:5432/multica?sslmode=disable"
